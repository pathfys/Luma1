<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Luma Gift</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --green: #2ecc71;
      --red: #e74c3c;
      --grey: #2a2a2a;
      --grey-hover: #333;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #3498db;
      --highlight-bg: rgba(46,204,113,0.08);
      --highlight-border: #2ecc71;
      --card-border: #222;
      --grid-color: rgba(52,152,219,0.25);
    }

    body.light {
      --bg: #e8f0fe;
      --surface: #ffffff;
      --surface2: #e0e0e5;
      --grey: #e0e0e5;
      --text: #1a1a1a;
      --text-muted: #666;
      --highlight-bg: rgba(46,204,113,0.1);
      --card-border: #ddd;
      --grid-color: rgba(41,128,185,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
      position: relative;
    }

   body::before {
  content: '';
  position: fixed;
  top: -100%;
  left: -100%;
  width: 400%;
  height: 400%;
  z-index: 0;
  background-image:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: 50px 50px;
  transform: perspective(500px) rotateX(45deg);
  transform-origin: center center;
  animation: waveGrid 6s ease-in-out infinite;
  pointer-events: none;
}

@keyframes waveGrid {
  0%   { transform: perspective(500px) rotateX(45deg) translateY(0px); }
  50%  { transform: perspective(500px) rotateX(45deg) translateY(-50px); }
  100% { transform: perspective(500px) rotateX(45deg) translateY(0px); }
}

    /* Все контентные блоки поверх canvas */
    .theme-toggle,
    .header,
    .welcome-card,
    .menu,
    .footer {
      position: relative;
      z-index: 1;
    }

    /* Кнопка темы */
    .theme-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      background: linear-gradient(135deg, #2980b9, #1a6fa3);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 20px;
      cursor: pointer;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(41,128,185,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .theme-toggle:active { transform: scale(0.9); }

    /* Header */
    .header {
      width: 100%;
      padding: 36px 24px 20px;
      text-align: center;
      animation: fadeUp 0.4s ease both;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--green), var(--accent));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-family: 'Unbounded', sans-serif;
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--green), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    /* Welcome card */
    .welcome-card {
      width: calc(100% - 32px);
      background: var(--surface);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 18px 20px;
      margin: 0 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeUp 0.4s ease 0.1s both;
      transition: background 0.3s, border-color 0.3s;
      backdrop-filter: blur(10px);
    }

    .welcome-card .row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13.5px;
    }

    .welcome-card .row .emoji { font-size: 16px; flex-shrink: 0; }

    .welcome-card .highlight {
      background: var(--highlight-bg);
      border-left: 3px solid var(--highlight-border);
      border-radius: 0 10px 10px 0;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .welcome-card .highlight .row { font-size: 13px; }
    .link { color: var(--accent); text-decoration: none; }

    /* Menu */
    .menu {
      width: calc(100% - 32px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 16px;
    }

    .btn {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.2px;
      position: relative;
      overflow: hidden;
    }

    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .btn-blue {
      background: linear-gradient(135deg, #2980b9, #1a6fa3);
      color: #fff;
      box-shadow: 0 4px 20px rgba(41,128,185,0.3);
    }

    .btn-red {
      background: linear-gradient(135deg, var(--red), #c0392b);
      color: #fff;
      box-shadow: 0 4px 20px rgba(231,76,60,0.25);
    }

    .btn::after {
      content: '';
      position: absolute;
      width: 100%; height: 100%;
      top: 0; left: 0;
      background: rgba(255,255,255,0.06);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:active::after { opacity: 1; }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      animation: fadeUp 0.35s ease 0.5s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn:nth-child(1) { animation: fadeUp 0.35s ease 0.15s both; }
    .btn:nth-child(2) { animation: fadeUp 0.35s ease 0.20s both; }
    .btn:nth-child(3) { animation: fadeUp 0.35s ease 0.25s both; }
    .btn:nth-child(4) { animation: fadeUp 0.35s ease 0.30s both; }
    .btn:nth-child(5) { animation: fadeUp 0.35s ease 0.35s both; }
  </style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

  <div class="header">
    <div class="logo-wrap">
      <div class="logo-icon">💎</div>
      <span class="logo-text">Luma Gift</span>
    </div>
  </div>

  <div class="welcome-card">
    <div class="row"><span class="emoji">👋</span> Вас приветствует <b>Luma Gift!</b></div>
    <div class="highlight">
      <div class="row"><span class="emoji">✨</span> <b>Luma Gift</b> – Сервис проверенный временем.</div>
      <div class="row"><span class="emoji">🤖</span> Ключевые метрики, сделки автоматизированы.</div>
    </div>
    <div class="row"><span class="emoji">💼</span> Поддержка 24/7 - <a class="link" href="https://t.me/LumaEscrow">@LumaEscrow</a></div>
    <div class="row"><span class="emoji">🛡</span> Ваша безопасность — наша работа</div>
  </div>

  <div class="menu">
    <button class="btn btn-blue" onclick="send('bind_wallet')">Управление реквизитами</button>
    <button class="btn btn-red"  onclick="send('create_deal')">Активация ордера</button>
    <button class="btn btn-blue" onclick="send('choose_language')">Сменить язык / Change Language</button>
    <button class="btn btn-blue" onclick="send('support')">Поддержка</button>
    <button class="btn btn-blue" onclick="send('help')">Безопасность</button>
  </div>

  <div class="footer">© 2024 Luma Gift · Безопасные сделки</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    if (tg.colorScheme === 'light') {
      document.body.classList.add('light');
      document.getElementById('themeBtn').textContent = '☀️';
    }

    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById('themeBtn');
      if (body.classList.contains('light')) {
        body.classList.remove('light');
        btn.textContent = '🌙';
      } else {
        body.classList.add('light');
        btn.textContent = '☀️';
      }
      initGrid(); // перерисовываем сетку с новым цветом
    }

    function send(action) {
      tg.sendData(JSON.stringify({ action }));
    }

    // ===== 3D WAVE GRID =====
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');

    const COLS = 16;
    const ROWS = 24;
    let points = [];
    let animFrame;
    let t = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function buildGrid() {
      points = [];
      for (let r = 0; r <= ROWS; r++) {
        for (let c = 0; c <= COLS; c++) {
          points.push({ r, c });
        }
      }
    }

    function project(x3d, y3d, z3d) {
      const fov = 600;
      const camZ = 300;
      const scale = fov / (fov + z3d + camZ);
      return {
        x: canvas.width / 2 + x3d * scale,
        y: canvas.height / 2 + y3d * scale,
        scale
      };
    }

    function getColor() {
      return document.body.classList.contains('light')
        ? 'rgba(41,128,185,0.22)'
        : 'rgba(52,152,219,0.28)';
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const W = canvas.width * 1.4;
      const H = canvas.height * 1.2;
      const cellW = W / COLS;
      const cellH = H / ROWS;
      const offX = -W / 2;
      const offY = -H / 2 - 80;

      const color = getColor();

      // Рисуем горизонтальные линии
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        for (let c = 0; c <= COLS; c++) {
          const x3d = offX + c * cellW;
          const y3d = offY + r * cellH;
          const wave = Math.sin(c * 0.4 + r * 0.3 + t) * 38
                     + Math.sin(c * 0.2 - t * 0.7) * 22;
          const z3d = wave;
          const p = project(x3d, y3d, z3d);
          if (c === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }

      // Рисуем вертикальные линии
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        for (let r = 0; r <= ROWS; r++) {
          const x3d = offX + c * cellW;
          const y3d = offY + r * cellH;
          const wave = Math.sin(c * 0.4 + r * 0.3 + t) * 38
                     + Math.sin(c * 0.2 - t * 0.7) * 22;
          const z3d = wave;
          const p = project(x3d, y3d, z3d);
          if (r === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }

      t += 0.018;
      animFrame = requestAnimationFrame(draw);
    }

    function initGrid() {
      cancelAnimationFrame(animFrame);
      resize();
      buildGrid();
      draw();
    }

    window.addEventListener('resize', initGrid);
    initGrid();
  </script>
</body>
</html>
