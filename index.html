<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Luma</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --green: #2ecc71;
      --red: #e74c3c;
      --grey: #2a2a2a;
      --grey-hover: #333;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #3498db;
      --highlight-bg: rgba(46,204,113,0.08);
      --highlight-border: #2ecc71;
      --card-border: #222;
      --grid-color: rgba(52,152,219,0.18);
      --nav-bg: #111111;
      --nav-border: #222;
    }

    body.light {
      --bg: #e8f0fe;
      --surface: #ffffff;
      --surface2: #e0e0e5;
      --grey: #e0e0e5;
      --text: #1a1a1a;
      --text-muted: #666;
      --highlight-bg: rgba(46,204,113,0.1);
      --card-border: #ddd;
      --grid-color: rgba(41,128,185,0.15);
      --nav-bg: #f0f0f5;
      --nav-border: #ddd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 80px;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      animation: waveGrid 6s ease-in-out infinite;
    }

    @keyframes waveGrid {
      0%   { background-position: 0 0; }
      50%  { background-position: 0 20px; }
      100% { background-position: 0 0; }
    }

    /* ===== ЕДИНАЯ ШАПКА — ФИКСИРОВАННАЯ ===== */
    .topbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 58px;
      background: rgba(13,13,13,0.85);
      border-bottom: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 999;
      transition: background 0.3s, border-color 0.3s;
    }

    body.light .topbar {
      background: rgba(232,240,254,0.88);
      border-bottom: 1px solid var(--nav-border);
    }

    /* ЛОГОТИП */
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 6px 12px 6px 8px;
    }

    body.light .logo-wrap {
      background: rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.10);
    }

    .ton-icon {
      width: 24px; height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      animation: tonGlow 2.5s ease-in-out infinite;
    }

    @keyframes tonGlow {
      0%, 100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.8)) drop-shadow(0 0 12px rgba(255,255,255,0.4)); }
      50%       { filter: drop-shadow(0 0 12px rgba(255,255,255,1.0)) drop-shadow(0 0 28px rgba(255,255,255,0.6)); }
    }

    .logo-text {
      font-family: 'Unbounded', sans-serif;
      font-size: 16px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.3px;
      text-shadow: 0 0 16px rgba(255,255,255,0.25), 0 2px 4px rgba(0,0,0,0.8);
    }

    body.light .logo-text {
      color: #1a1a1a;
      text-shadow: 0 1px 3px rgba(0,0,0,0.15);
    }

    /* ПРАВАЯ ЧАСТЬ ШАПКИ */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-toggle { position: relative; }

    .lang-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      height: 32px;
      padding: 0 10px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: transform 0.2s, background 0.2s;
      letter-spacing: 0.4px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    body.light .lang-btn {
      background: rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.12);
    }

    .lang-btn:active { transform: scale(0.9); }

    .lang-btn .arrow {
      font-size: 8px;
      transition: transform 0.2s;
      display: inline-block;
    }

    .lang-btn.open .arrow { transform: rotate(180deg); }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      min-width: 160px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(-8px) scale(0.96);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 1001;
    }

    .lang-dropdown.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
    }

    .lang-option:hover { background: var(--grey); }
    .lang-option:active { background: var(--grey-hover); }
    .lang-option .flag { font-size: 18px; }
    .lang-option.selected { color: var(--accent); }
    .lang-option + .lang-option { border-top: 1px solid var(--card-border); }

    .theme-toggle {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.2s;
      backdrop-filter: blur(8px);
    }

    body.light .theme-toggle {
      background: rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.12);
    }

    .theme-toggle:active { transform: scale(0.9); }

    /* ===== ОТСТУП ПОД ШАПКУ ===== */
    .page-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 72px;
    }

    /* ===== WELCOME CARD ===== */
    .welcome-card {
      width: calc(100% - 32px);
      background: var(--surface);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 18px 20px;
      margin: 0 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeUp 0.4s ease 0.1s both;
      transition: background 0.3s, border-color 0.3s;
      backdrop-filter: blur(10px);
    }

    .welcome-card .row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13.5px;
    }

    .welcome-card .row .emoji { font-size: 16px; flex-shrink: 0; }

    .welcome-card .highlight {
      background: var(--highlight-bg);
      border-left: 3px solid var(--highlight-border);
      border-radius: 0 10px 10px 0;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .welcome-card .highlight .row { font-size: 13px; }
    .link { color: var(--accent); text-decoration: none; }

    /* ===== МЕНЮ ===== */
    .menu {
      width: calc(100% - 32px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 16px;
    }

    .btn {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.15s ease, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.2px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
    }

    body.light .btn {
      background: rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.10);
      color: rgba(0,0,0,0.80);
    }

    .btn:hover {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.22);
    }

    body.light .btn:hover { background: rgba(0,0,0,0.09); }
    .btn:active { transform: scale(0.97); opacity: 0.85; }

    .btn:nth-child(1) { animation: fadeUp 0.35s ease 0.15s both; }
    .btn:nth-child(2) { animation: fadeUp 0.35s ease 0.20s both; }
    .btn:nth-child(3) { animation: fadeUp 0.35s ease 0.25s both; }
    .btn-how {
  margin: 0 16px 16px;
  width: calc(100% - 32px);
  animation: fadeUp 0.35s ease 0.10s both;
}

    .footer {
      margin-top: 28px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      animation: fadeUp 0.35s ease 0.5s both;
    }

    /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      height: 72px;
      background: var(--nav-bg);
      border-top: 1px solid var(--nav-border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 998;
      backdrop-filter: blur(12px);
      transition: background 0.3s;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      padding: 6px 12px;
      border: none;
      background: transparent;
      transition: transform 0.15s;
      flex: 1;
      position: relative;
    }

    .nav-item:active { transform: scale(0.92); }

    .nav-circle {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    body.light .nav-circle { background: #e0e0e5; }
    .nav-circle svg { color: #888; transition: color 0.2s; }
    .nav-item.active .nav-circle { background: #2a2a2a; }
    .nav-item.active .nav-circle svg { color: #ffffff; }
    .nav-item.active .nav-label { color: #3498db; }

    .nav-item.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 24px; height: 3px;
      background: #3498db;
      border-radius: 3px 3px 0 0;
    }

    .nav-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      transition: color 0.2s;
      letter-spacing: 0.3px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== ПРОФИЛЬ ===== */
    .profile-screen {
      width: calc(100% - 32px);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 0 16px;
      animation: fadeUp 0.4s ease both;
    }

    .profile-screen.visible { display: flex; }

   .profile-avatar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding-top: 110px;
}
    .avatar-ring {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3bc6f5, #2980b9);
      padding: 3px;
      box-shadow: 0 0 20px rgba(59,198,245,0.5);
      animation: tonGlow 2.5s ease-in-out infinite;
    }

    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
    }

    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }

    .profile-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    .profile-id-badge {
      background: var(--surface);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.3s, border-color 0.3s;
    }

    .profile-id-badge .id-label { color: var(--text-muted); font-size: 13px; font-weight: 500; }
    /* ===== ПЛАШКА ПОЛЬЗОВАТЕЛЯ ===== */
.user-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 999px;
  padding: 4px 12px 4px 4px;
  cursor: pointer;
  transition: box-shadow 0.25s ease, background 0.2s;
  max-width: 140px;
}

body.light .user-pill {
  background: rgba(0,0,0,0.05);
  border: 1px solid rgba(0,0,0,0.10);
}

.user-pill:active,
.user-pill.glow {
  box-shadow: 0 0 0 2px rgba(52,152,219,0.7), 0 0 16px rgba(52,152,219,0.4);
  background: rgba(52,152,219,0.12);
  border-color: rgba(52,152,219,0.5);
}

.user-pill-avatar {
  width: 28px;
  height: 28px;
  min-width: 28px;
  border-radius: 50%;
  background: var(--surface2);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.user-pill-avatar img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
}

.user-pill-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 90px;
}
    .profile-id-badge .id-value { color: var(--accent); font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }

    .profile-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(10px);
      transition: background 0.3s, border-color 0.3s;
    }

    .profile-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    body.light .profile-row { border-bottom: 1px solid rgba(0,0,0,0.05); }
    .profile-row:last-child { border-bottom: none; padding-bottom: 0; }

    .profile-row .row-label {
      color: var(--text-muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-row .row-label .emoji { font-size: 15px; }
    .profile-row .row-value { font-size: 14px; font-weight: 600; color: var(--text-muted); }
  </style>
</head>
<body>


    
  <!-- ===== ЕДИНАЯ ФИКСИРОВАННАЯ ШАПКА ===== -->
  <header class="topbar">
    <div class="logo-wrap">
      <div class="ton-icon">
        <svg width="22" height="22" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M28 0C12.536 0 0 12.536 0 28C0 43.464 12.536 56 28 56C43.464 56 56 43.464 56 28C56 12.536 43.464 0 28 0Z" fill="white" fill-opacity="0.12"/>
          <path d="M37.12 15.68H18.88C15.344 15.68 13.216 19.52 15.12 22.512L26.32 40.88C27.056 42.096 28.944 42.096 29.68 40.88L40.88 22.512C42.784 19.52 40.656 15.68 37.12 15.68ZM26.24 37.168L20.048 27.04H26.24V37.168ZM26.24 24.432H18.08L26.24 18.96V24.432ZM29.76 37.168V27.04H35.952L29.76 37.168ZM29.76 24.432V18.96L37.92 24.432H29.76Z" fill="white"/>

      </div>
      <span class="logo-text">Luma</span>

<div class="user-pill" id="userPill" onclick="navClick(document.getElementById('navProfile'),'profile')">

  <span class="user-pill-name" id="pillName">—</span>
</div>
    
    <div class="topbar-right">
      <div class="lang-toggle" id="langToggle">
        <button class="lang-btn" id="langBtn" onclick="toggleLang()">
          <span id="langBtnText">🇷🇺 RU</span>
          <span class="arrow">▼</span>

        <div class="lang-dropdown" id="langDropdown">
          <button class="lang-option selected" onclick="selectLang('ru','🇷🇺','RU',this)"><span class="flag">🇷🇺</span> Русский</button>
          <button class="lang-option" onclick="selectLang('en','🇬🇧','EN',this)"><span class="flag">🇬🇧</span> English</button>
          <button class="lang-option" onclick="selectLang('uk','🇺🇦','UA',this)"><span class="flag">🇺🇦</span> Українська</button>
          <button class="lang-option" onclick="selectLang('es','🇪🇸','ES',this)"><span class="flag">🇪🇸</span> Español</button>
        </div>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </header>

  <!-- ===== ГЛАВНАЯ ===== -->
<div class="page-wrap" id="mainScreen">

  <div class="menu">
    <button class="btn btn-how" onclick="send('how_to_order')">❓ Как создать ордер?</button>
    <button class="btn" onclick="send('create_deal')" id="btn-deal"></button>
    <button class="btn" onclick="send('support')"     id="btn-support"></button>
    <button class="btn" onclick="send('help')"        id="btn-help"></button>
  </div>

  <div class="footer" id="txt-footer"></div>

</div>

  <!-- ===== ПРОФИЛЬ ===== -->
  <div class="page-wrap profile-screen" id="profileScreen">

    <div class="profile-avatar-wrap">
      <div class="avatar-ring">
        <div class="avatar-inner" id="avatarInner">👤</div>
      </div>
      <div class="profile-name" id="profileName">—</div>
      <div class="profile-id-badge">
        <span class="id-label">ID:</span>
        <span class="id-value" id="profileId">—</span>
      </div>
    </div>

    <div class="profile-card">
     <div class="profile-row">
  <span class="row-label">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg>
    <span id="txt-prof-username"></span>
  </span>
  <span class="row-value" id="cardUsername">—</span>
</div>
<div class="profile-row">
  <span class="row-label">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3c-2.5 3-4 5.5-4 9s1.5 6 4 9"/><path d="M12 3c2.5 3 4 5.5 4 9s-1.5 6-4 9"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
    <span id="txt-prof-lang"></span>
  </span>
  <span class="row-value" id="cardLang">—</span>
</div>
<div class="profile-row">
  <span class="row-label">

    <span id="txt-prof-status"></span>
  </span>
  <span class="row-value">—</span>
</div>
<div class="profile-row">
  <span class="row-label">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span id="txt-prof-deals"></span>
  </span>
  <span class="row-value">—</span>
</div>
    </div>

    <div class="footer" id="txt-footer-profile" style="margin-top:8px;"></div>

  </div>

    /* ===== ПЕРЕВОДЫ ===== */

  function applyLang(code) {
  const t = i18n[code];
  document.getElementById('btn-deal').textContent    = t.btnDeal;
  document.getElementById('btn-support').textContent = t.btnSupport;
  document.getElementById('btn-help').textContent    = t.btnHelp;
  document.getElementById('txt-footer').textContent          = t.footer;
  document.getElementById('txt-footer-profile').textContent  = t.footer;
  document.getElementById('nav-profile-label').textContent   = t.navProfile;
  document.getElementById('nav-home-label').textContent      = t.navHome;
  document.getElementById('nav-history-label').textContent   = t.navHistory;
  document.getElementById('nav-top-label').textContent       = t.navTop;
  document.getElementById('txt-prof-username').textContent   = t.profUsername;
  document.getElementById('txt-prof-lang').textContent       = t.profLang;
  document.getElementById('txt-prof-status').textContent     = t.profStatus;
  document.getElementById('txt-prof-deals').textContent      = t.profDeals;
}

    applyLang('ru');

    /* ===== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ===== */
   const user = tg.initDataUnsafe?.user || {};
const fullName = [user.first_name, user.last_name].filter(Boolean).join(' ') || '—';

document.getElementById('profileName').textContent  = fullName;
document.getElementById('profileId').textContent    = user.id || '—';
document.getElementById('cardUsername').textContent = user.username ? '@' + user.username : '—';

// Язык из Telegram
const langMap = { ru: '🇷🇺 Русский', en: '🇬🇧 English', uk: '🇺🇦 Українська', es: '🇪🇸 Español' };
const userLang = user.language_code || 'en';
document.getElementById('cardLang').textContent = langMap[userLang] || userLang.toUpperCase();

    // Плашка пользователя в шапке
document.getElementById('pillName').textContent = user.username ? '@' + user.username : (user.first_name || '—');

const pill = document.getElementById('userPill');
pill.addEventListener('click', () => {
  pill.classList.add('glow');
  setTimeout(() => pill.classList.remove('glow'), 600);
});
    
  if (user.photo_url) {
  const img = document.createElement('img');
  img.src = user.photo_url;
  img.alt = fullName;
  document.getElementById('avatarInner').innerHTML = '';
  document.getElementById('avatarInner').appendChild(img);

  // Та же аватарка в плашке шапки
  const pillImg = document.createElement('img');
  pillImg.src = user.photo_url;
  pillImg.alt = fullName;
  document.getElementById('pillAvatar').innerHTML = '';
  document.getElementById('pillAvatar').appendChild(pillImg);
}

    /* ===== ТЕМА ===== */
    function toggleTheme() {
      const light = document.body.classList.toggle('light');
      document.getElementById('themeBtn').textContent = light ? '☀️' : '🌙';
    }

    /* ===== ЯЗЫК ===== */
    let currentLang = 'ru';
    let dropdownOpen = false;

    function toggleLang() {
      dropdownOpen = !dropdownOpen;
      document.getElementById('langBtn').classList.toggle('open', dropdownOpen);
      document.getElementById('langDropdown').classList.toggle('open', dropdownOpen);
    }

   function selectLang(code, flag, label, el) {
  currentLang = code;
  document.getElementById('langBtnText').textContent = flag + ' ' + label;
  document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  dropdownOpen = false;
  document.getElementById('langBtn').classList.remove('open');
  document.getElementById('langDropdown').classList.remove('open');
  applyLang(code);
  // Обновляем язык в профиле при ручной смене
  const langMap = { ru: '🇷🇺 Русский', en: '🇬🇧 English', uk: '🇺🇦 Українська', es: '🇪🇸 Español' };
  document.getElementById('cardLang').textContent = langMap[code] || code.toUpperCase();
  send('set_language:' + code);
}

    document.addEventListener('click', function(e) {
      if (!document.getElementById('langToggle').contains(e.target)) {
        dropdownOpen = false;
        document.getElementById('langBtn').classList.remove('open');
        document.getElementById('langDropdown').classList.remove('open');
      }
    });

    /* ===== НАВИГАЦИЯ ===== */
    function navClick(el, action) {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');

      const main    = document.getElementById('mainScreen');
      const profile = document.getElementById('profileScreen');

      if (action === 'profile') {
        main.style.display    = 'none';
        profile.style.display = 'flex';
        profile.classList.add('visible');
      } else if (action === 'home') {
        profile.style.display = 'none';
        profile.classList.remove('visible');
        main.style.display    = 'flex';
      } else {
        profile.style.display = 'none';
        profile.classList.remove('visible');
        main.style.display    = 'flex';
        send(action);
      }
    }

    function send(action) {
      tg.sendData(JSON.stringify({ action }));
    }
  </script>
